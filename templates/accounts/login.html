{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0b3d91, #1e90ff);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .corner-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px;
        }

        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            width: 80px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 20px;
            color: #0b3d91;
        }

        .error {
            color: red;
            margin-bottom: 10px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #1e90ff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #0b3d91;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #1e90ff;
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>

<body>

    <img src="{% static 'images/logoutc2.png' %}" alt="Logo góc trái" class="corner-logo">

    <div class="login-container">
        <img src="{% static 'images/logoutc2.png' %}" alt="Logo trường" class="logo">

        <h2>Đăng nhập hệ thống</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
            <input type="password" name="password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng nhập</button>
        </form>

        <div class="footer">
            YOLO + LSTM Detection System
        </div>
    </div>

</body>
</html>
